name: 自动更新美术馆名录数据

on:
  schedule:
    # 每周一凌晨 0 点自动运行一次 (UTC 时间，+8 小时为北京时间)
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      city:
        description: "目标城市，如：上海市、广州市（默认：北京市）"
        required: false
        default: "北京市"
        type: string

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    # 1. 签出仓库代码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. 安装 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 安装脚本依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    # 4. 运行抓取脚本
    - name: Run fetch script
      env:
        AMAP_KEY: ${{ secrets.AMAP_KEY }}
        CITY: ${{ inputs.city || '北京市' }}
      run: python fetch_art_venues.py

    # 5. 自动提交并推送 CSV
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add *_art_museums_raw.csv
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "🤖 自动更新: ${{ inputs.city || '北京市' }}艺术场馆数据" &&
          git pull --rebase &&
          git push
        )
